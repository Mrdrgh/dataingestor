version: '3.8'

x-airflow-common:
  &airflow-common
  build: .
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlBpi3c-kOQ8s4lW4F11Ew=
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: '10'
    SOURCE_PGHOST: postgres-source
    SOURCE_PGPORT: '5432'
    SOURCE_PGDATABASE: example_db
    SOURCE_PGUSER: postgres
    SOURCE_PGPASSWORD: postgres
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ./spark:/opt/airflow/spark
    - airflow-logs:/opt/airflow/logs
    - ./delta:/opt/airflow/delta
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  postgres-airflow:
    image: postgres:15
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  postgres-source:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=example_db
    ports:
      - "${SOURCE_PG_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-source-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      postgres-airflow:
        condition: service_healthy
      postgres-source:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  postgres-notebooks:
    image: postgres:15
    environment:
      - POSTGRES_USER=notebooks
      - POSTGRES_PASSWORD=notebooks
      - POSTGRES_DB=notebooks_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-notebooks-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "notebooks"]
      interval: 10s
      retries: 5
      start_period: 5s

  jupyter-kernel-gateway:
    build:
      context: .
      dockerfile: Dockerfile.kernel-gateway
      args:
        DELTA_VERSION: ${DELTA_VERSION:-3.1.0}
        CUSTOM_PIP_PACKAGES: ${KERNEL_PIP_PACKAGES:-}
    ports:
      - "8888:8888"
    environment:
      - KG_ALLOW_ORIGIN=*
      - KG_LIST_KERNELS=True
    volumes:
      - ./delta:/opt/spark/delta
    depends_on:
      postgres-notebooks:
        condition: service_healthy

volumes:
  airflow-logs:
  postgres-source-data:
  postgres-notebooks-data:

version: '3.8'

x-airflow-common:
  &airflow-common
  build:
    context: .
    args:
      HADOOP_AWS_VERSION: ${HADOOP_AWS_VERSION:-3.3.4}
      AWS_SDK_BUNDLE_VERSION: ${AWS_SDK_BUNDLE_VERSION:-1.12.262}
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlBpi3c-kOQ8s4lW4F11Ew=
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: '10'
    SOURCE_PGHOST: postgres-source
    SOURCE_PGPORT: '5432'
    SOURCE_PGDATABASE: example_db
    SOURCE_PGUSER: postgres
    SOURCE_PGPASSWORD: postgres
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_BUCKET: ${MINIO_BUCKET}
    MINIO_REGION: ${MINIO_REGION:-us-east-1}
    MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    MINIO_PATH_STYLE: ${MINIO_PATH_STYLE:-true}
    DELTA_BASE_PATH: s3a://${MINIO_BUCKET}
    SPARK_JARS_PACKAGES: ${SPARK_JARS_PACKAGES:-org.apache.hadoop:hadoop-aws:${HADOOP_AWS_VERSION:-3.3.4},com.amazonaws:aws-java-sdk-bundle:${AWS_SDK_BUNDLE_VERSION:-1.12.262}}
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ./spark:/opt/airflow/spark
    - airflow-logs:/opt/airflow/logs
    - ./delta:/opt/airflow/delta
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local "$$MINIO_ENDPOINT" "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing --with-lock "local/$$MINIO_BUCKET" &&
        mc anonymous set none "local/$$MINIO_BUCKET"

  postgres-airflow:
    image: postgres:15
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  postgres-source:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=example_db
    ports:
      - "${SOURCE_PG_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-source-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      postgres-airflow:
        condition: service_healthy
      postgres-source:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  postgres-notebooks:
    image: postgres:15
    environment:
      - POSTGRES_USER=notebooks
      - POSTGRES_PASSWORD=notebooks
      - POSTGRES_DB=notebooks_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-notebooks-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "notebooks"]
      interval: 10s
      retries: 5
      start_period: 5s

  jupyter-kernel-gateway:
    build:
      context: .
      dockerfile: Dockerfile.kernel-gateway
      args:
        DELTA_VERSION: ${DELTA_VERSION:-3.1.0}
        CUSTOM_PIP_PACKAGES: ${KERNEL_PIP_PACKAGES:-}
        HADOOP_AWS_VERSION: ${HADOOP_AWS_VERSION:-3.3.4}
        AWS_SDK_BUNDLE_VERSION: ${AWS_SDK_BUNDLE_VERSION:-1.12.262}
    ports:
      - "8888:8888"
    environment:
      - KG_ALLOW_ORIGIN=*
      - KG_LIST_KERNELS=True
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - MINIO_PATH_STYLE=${MINIO_PATH_STYLE:-true}
      - PYSPARK_SUBMIT_ARGS=--packages io.delta:delta-spark_2.12:${DELTA_VERSION:-3.1.0},org.apache.hadoop:hadoop-aws:${HADOOP_AWS_VERSION:-3.3.4},com.amazonaws:aws-java-sdk-bundle:${AWS_SDK_BUNDLE_VERSION:-1.12.262} --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog --conf spark.hadoop.fs.s3a.endpoint=${MINIO_ENDPOINT} --conf spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER} --conf spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD} --conf spark.hadoop.fs.s3a.path.style.access=${MINIO_PATH_STYLE:-true} --conf spark.hadoop.fs.s3a.connection.ssl.enabled=${MINIO_USE_SSL:-false} --conf spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider --conf spark.delta.logStore.class=org.apache.spark.sql.delta.storage.S3SingleDriverLogStore pyspark-shell
    volumes:
      - ./delta:/opt/spark/delta
    depends_on:
      postgres-notebooks:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  airflow-logs:
  postgres-source-data:
  postgres-notebooks-data:
  minio-data:
